name: Release

# ============================================================================
# parsekit's release workflow — a thin caller of the shared reusable workflow
# scientist-labs/rust-gem-release (pinned @v0, the moving-major alias that
# currently resolves to 0.2.0). Modeled on red-candle 1.8.0, the proven
# template (all four platforms green on rubygems.org, 2026-06-18).
#
# This caller owns ONLY what a reusable (on: workflow_call) workflow cannot:
#   - the version-tag trigger
#   - the contents:write token grant (a reusable workflow can only REDUCE the
#     inherited token scope, so the caller must grant it here)
#   - parsekit's per-gem inputs + the RubyGems secret mapping
#
# SAFETY: publish defaults to a DRY-RUN. On manual workflow_dispatch publish is
# false unless explicitly toggled on; only a real version-tag push publishes
# (and even then, push is a clean no-op if RUBYGEMS_API_KEY is empty).
#
# BUILD-LEG SCOPE (see the per-leg toggles below): parsekit's native extension
# statically builds MuPDF and Tesseract+Leptonica from C/C++ source. The shared
# workflow's linux legs run inside cross-gem's fixed rb-sys-dock image, which
# offers NO hook to apt-install absent build deps, and the aarch64 leg
# CROSS-compiles that bundled-C++ stack on an x86_64 host (fragile; the bundled
# Tesseract also downloads source at build time). aarch64-linux is therefore
# disabled here — aarch64 users fall through to the SOURCE gem, which compiles
# the C stack on install. The source gem + arm64-darwin + x86_64-linux remain
# the published precompiled set; flip build-aarch64-linux back on once the
# shared workflow grows a native-arm / prebuilt-sysroot path for C-heavy gems.
# ============================================================================

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"        # release:    0.1.3
      - "[0-9]+.[0-9]+.[0-9]+.*"      # prerelease: 0.1.3.pre1 (RubyGems dot form)
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+.*"
  workflow_dispatch:
    inputs:
      publish:
        type: boolean
        default: false
        description: "push to RubyGems (default off = dry-run)"

permissions:
  contents: write

jobs:
  release:
    uses: scientist-labs/rust-gem-release/.github/workflows/release.yml@v0
    with:
      # gem-name == ext-name == gemspec basename == "parsekit", so ext-name and
      # gemspec resolve to their defaults and need not be passed.
      gem-name: parsekit
      # NOTE: the constant is ParseKit (capital K), not Parsekit — the tag must
      # equal this command's output or the prepare job's tag==version guard fails.
      version-command: ruby -r./lib/parsekit/version -e 'print ParseKit::VERSION'
      # parsekit.gemspec reads the generic default env var RUST_GEM_PLATFORM, so
      # platform-gem-env is left at its default and omitted.
      build-aarch64-linux: false
      publish: ${{ github.event_name == 'push' || inputs.publish }}
    secrets:
      rubygems-api-key: ${{ secrets.RUBYGEMS_API_KEY }}
